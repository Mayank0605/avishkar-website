<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avishkar Enterprises</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:Inter,sans-serif;
background:#f8fafc;
color:#111827;
}

/* NAV */
nav{
position:fixed;
top:0;
width:100%;
background:#ffffff;
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 20px;
box-shadow:0 4px 20px rgba(0,0,0,0.06);
z-index:1000;
}

/* BRAND */
.brand{
display:flex;
align-items:center;
gap:12px;
}

/* ICON */
.logo-icon{
height:40px;
}

/* NAME (FIXED SIZE) */
.logo-name{
height:44px; /* bigger + visible */
}

/* MENU */
.menu{
display:flex;
gap:18px;
}

.menu a{
text-decoration:none;
color:#374151;
font-size:14px;
font-weight:500;
}

/* HERO */
.hero{
padding:110px 20px 60px;
max-width:1200px;
margin:auto;
display:flex;
flex-wrap:wrap;
gap:40px;
align-items:center;
}

.hero-text{
flex:1;
min-width:280px;
}

.hero-text h1{
font-size:34px;
margin-bottom:12px;
}

.hero-text p{
color:#6b7280;
font-size:16px;
}

.hero-img{
flex:1;
min-width:280px;
}

.hero-img img{
width:100%;
border-radius:12px;
box-shadow:0 20px 50px rgba(0,0,0,0.1);
}

/* BUTTON */
.btn{
display:inline-block;
margin-top:14px;
padding:12px 20px;
border-radius:8px;
text-decoration:none;
background:#111827;
color:white;
font-size:14px;
font-weight:600;
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
<div class="brand">
<img src="logo-text.png" class="logo-icon">
<img src="brand-name.png" class="logo-name">
</div>

<div class="menu">
<a href="index.html">Home</a>
<a href="services.html">Services</a>
<a href="about.html">About</a>
<a href="contact.html">Contact</a>
</div>
</nav>

<!-- HERO -->
<section class="hero">

<div class="hero-text">
<h1>Fast & Reliable Custom Clearance</h1>
<p>Handling shipments across India with speed, accuracy and strong industry network.</p>

<a href="contact.html" class="btn">Get Quote</a>
</div>

<div class="hero-img">
<img src="https://images.unsplash.com/photo-1586528116311-ad8dd3c8310d">
</div>

</section>

</body>
</html>
