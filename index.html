<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avishkar Enterprises</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:Inter,sans-serif;
color:#111;
background:linear-gradient(135deg,#f8fafc,#e2e8f0);
}

/* WATERMARK */
body::after{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:url('logo-text.png') center no-repeat;
background-size:500px;
opacity:0.04;
z-index:0;
pointer-events:none;
}

/* NAVBAR */
nav{
position:fixed;
top:0;
width:100%;
background:#0f172a;
color:white;
display:flex;
justify-content:space-between;
align-items:center;
padding:10px 15px;
flex-wrap:wrap;
z-index:1000;
}

.logo{
display:flex;
align-items:center;
gap:8px;
max-width:60%;
}

.logo img{
height:32px;
}

.logo span{
font-size:13px;
font-weight:600;
white-space:nowrap;
}

.nav-links{
display:flex;
flex-wrap:wrap;
gap:10px;
}

.nav-links a{
color:#cbd5f5;
text-decoration:none;
font-size:13px;
}

/* HERO */
.hero{
padding:120px 20px 60px;
display:flex;
flex-wrap:wrap;
max-width:1200px;
margin:auto;
gap:30px;
position:relative;
z-index:1;
}

.hero-text{flex:1;}
.hero-img{flex:1;}

.hero-img img{
width:100%;
border-radius:12px;
}

/* BUTTON */
.btn{
background:#2d6a4f;
color:white;
padding:12px 22px;
border-radius:8px;
text-decoration:none;
margin-top:10px;
display:inline-block;
}

.btn.wa{background:#25D366}

/* SECTION */
.section{
padding:70px 20px;
text-align:center;
max-width:1100px;
margin:auto;
position:relative;
z-index:1;
}

.grid{
display:grid;
gap:20px;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
}

.card{
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

/* CTA */
.cta{
background:#0f172a;
color:white;
padding:60px;
margin:40px 20px;
border-radius:12px;
position:relative;
z-index:1;
}

/* FOOTER */
footer{
text-align:center;
padding:20px;
color:#666;
position:relative;
z-index:1;
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
<div class="logo">
<img src="logo-text.png">
<span>AVISHKAR ENTERPRISES</span>
</div>

<div class="nav-links">
<a href="index.html">Home</a>
<a href="services.html">Services</a>
<a href="about.html">About</a>
<a href="contact.html">Contact</a>
</div>
</nav>

<!-- HERO -->
<section class="hero">
<div class="hero-text">
<h1>Fast & Reliable Custom Clearance</h1>
<p>1000+ shipments handled across India.</p>

<a href="contact.html" class="btn">Get Quote</a>
<a href="https://wa.me/919820499918" class="btn wa">WhatsApp</a>
</div>

<div class="hero-img">
<img src="https://images.unsplash.com/photo-1586528116311-ad8dd3c8310d">
</div>
</section>

<!-- TRUST -->
<section class="section">
<h2>Why Clients Choose Us</h2>

<div class="grid">
<div class="card">Fast clearance</div>
<div class="card">Accurate documentation</div>
<div class="card">Pan India operations</div>
</div>
</section>

<footer>© 2026 Avishkar Enterprises</footer>

</body>
</html>
