<!DOCTYPE html>
<html lang="en">
<head>

<title>Avishkar Enterprises</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;

background:#eef2f7;

/* NAV FIX (THIS IS THE ONLY IMPORTANT PART) */
nav{
position:fixed;
top:0;
width:100%;
background:#0f172a;
display:flex;
justify-content:space-between;
align-items:center;
padding:10px;

}

/* LOGO */
.logo{
display:flex;
align-items:center;
gap:6px;
white-space:nowrap;
}

.logo img{
height:28px;
}

.logo span{
color:white;
font-size:12px;
}

/* MENU */
.menu{
display:flex;
gap:10px;
white-space:nowrap;
}

.menu a{
color:#cbd5f5;
text-decoration:none;
font-size:12px;
}

/* HERO */
.hero{
padding:100px 20px 40px;
display:flex;
flex-wrap:wrap;
gap:20px;
}

.hero img{
width:100%;
border-radius:10px;
}

/* BUTTON */
.btn{
background:#2d6a4f;
color:white;
padding:10px 16px;
border-radius:6px;
text-decoration:none;
display:inline-block;
margin-top:10px;
}

</head>

<nav>
<div class="logo">
<img src="logo-text.png">

<div class="menu">

</div>

<div>
<img src="https://images.unsplash.com/photo-1586528116311-ad8dd3c8310d">
