<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avishkar Enterprises</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:Inter,sans-serif;
background:#f8fafc;
color:#111827;
}

/* NAV */
nav{
position:fixed;
top:0;
width:100%;
background:#ffffff;
display:flex;
justify-content:space-between;
align-items:center;
padding:14px 16px;
box-shadow:0 4px 20px rgba(0,0,0,0.06);
z-index:1000;
overflow-x:auto;
}

/* BRAND (LOCKED) */
.brand{
display:flex;
align-items:center;
gap:10px;
white-space:nowrap;
}

.brand img{
height:32px;
}

.brand span{
font-weight:700;
font-size:14px;
color:#111827; /* FIXED */
}

/* MENU */
.menu{
display:flex;
gap:14px;
white-space:nowrap;
}

.menu a{
text-decoration:none;
color:#374151;
font-size:13px;
}

/* HERO */
.hero{
padding:100px 20px 60px;
max-width:1200px;
margin:auto;
display:flex;
flex-wrap:wrap;
gap:30px;
}

.hero-text{
flex:1;
min-width:280px;
}

.hero-text h1{
font-size:30px;
margin-bottom:10px;
}

.hero-text p{
color:#6b7280;
}

.hero-img{
flex:1;
min-width:280px;
}

.hero-img img{
width:100%;
border-radius:10px;
}

/* BUTTON */
.btn{
display:inline-block;
margin-top:12px;
padding:10px 18px;
border-radius:6px;
text-decoration:none;
background:#111827;
color:white;
font-size:13px;
}

/* SECTION */
.section{
padding:60px 20px;
max-width:1100px;
margin:auto;
text-align:center;
}

.grid{
display:grid;
gap:15px;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 6px 18px rgba(0,0,0,0.05);
}
</style>
</head>

<body>

<nav>
<div class="brand">
<img src="logo-text.png">
<span>AVISHKAR ENTERPRISES</span>
</div>

<div class="menu">
<a href="index.html">Home</a>
<a href="services.html">Services</a>
<a href="about.html">About</a>
<a href="contact.html">Contact</a>
</div>
</nav>

<section class="hero">

<div class="hero-text">
<h1>Fast & Reliable Custom Clearance</h1>
<p>Handling shipments across India with speed and accuracy.</p>

<a href="contact.html" class="btn">Get Quote</a>
</div>

<div class="hero-img">
<img src="https://images.unsplash.com/photo-1586528116311-ad8dd3c8310d">
</div>

</section>

<section class="section">
<h2>Our Services</h2>

<div class="grid">
<div class="card">Import Clearance</div>
<div class="card">Export Clearance</div>
<div class="card">Freight Forwarding</div>
</div>
</section>

</body>
</html>
